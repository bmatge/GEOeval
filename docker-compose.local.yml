# PostgreSQL local pour GEOeval.
#
#   docker compose up -d          # démarre la base
#   python init_db.py             # crée le schéma
#   psql "$DATABASE_URL" -f seed.sql   # (ou via le conteneur, voir README)
#
# DATABASE_URL correspondant (à mettre dans .env) :
#   postgresql+psycopg2://geoeval:geoeval@localhost:5432/geoeval

services:
  db:
    image: postgres:16
    container_name: geoeval-postgres
    environment:
      POSTGRES_USER: geoeval
      POSTGRES_PASSWORD: geoeval
      POSTGRES_DB: geoeval
    ports:
      - "5432:5432"
    volumes:
      - geoeval_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoeval -d geoeval"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  geoeval_pgdata:
