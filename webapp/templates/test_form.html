{% extends "base.html" %}
{% block title %}{{ "Éditer" if test else "Nouveau" }} test{% endblock %}
{% block content %}
<a class="fr-link fr-icon-arrow-left-line fr-link--icon-left" href="{{ url_prefix }}/tests">Retour aux tests</a>
<h1 class="fr-mt-2w">{{ "Éditer le test " ~ test.test_id if test else "Nouveau test" }}</h1>

<form method="post" action="{{ (url_prefix ~ '/tests/' ~ test.test_id ~ '/edit') if test else (url_prefix ~ '/tests/new') }}" class="fr-mt-2w">
  <div class="fr-input-group">
    <label class="fr-label" for="prompt">Question (prompt)
      <span class="fr-hint-text">La question posée au modèle testé.</span>
    </label>
    <textarea class="fr-input" id="prompt" name="prompt" rows="3" required>{{ test.prompt if test else "" }}</textarea>
  </div>

  <div class="fr-input-group">
    <label class="fr-label" for="expected_answer">Réponse attendue
      <span class="fr-hint-text">Variantes possibles séparées par «  OU  ». Vide = test non évaluable.</span>
    </label>
    <textarea class="fr-input" id="expected_answer" name="expected_answer" rows="2">{{ test.expected_answer if test and test.expected_answer else "" }}</textarea>
  </div>

  <div class="fr-select-group">
    <label class="fr-label" for="response_quality_prompt_id">Prompt — qualité de la réponse</label>
    <select class="fr-select" id="response_quality_prompt_id" name="response_quality_prompt_id">
      <option value="">— aucun —</option>
      {% for p in prompts %}
      <option value="{{ p.prompt_id }}" {% if test and test.response_quality_prompt_id == p.prompt_id %}selected{% endif %}>
        {{ p.prompt_id }} · {{ p.prompt_name }} ({{ p.prompt_type_label }})
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="fr-select-group">
    <label class="fr-label" for="citation_quality_prompt_id">Prompt — qualité des citations</label>
    <select class="fr-select" id="citation_quality_prompt_id" name="citation_quality_prompt_id">
      <option value="">— aucun —</option>
      {% for p in prompts %}
      <option value="{{ p.prompt_id }}" {% if test and test.citation_quality_prompt_id == p.prompt_id %}selected{% endif %}>
        {{ p.prompt_id }} · {{ p.prompt_name }} ({{ p.prompt_type_label }})
      </option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="fr-btn fr-mt-2w">Enregistrer</button>
</form>
{% endblock %}
