{% extends "base.html" %}
{% block title %}Clé API — {{ model.model_version }}{% endblock %}
{% block content %}
<a class="fr-link fr-icon-arrow-left-line fr-link--icon-left" href="{{ url_prefix }}/models">Retour au catalogue</a>
<h1 class="fr-mt-2w">Clé API de l'organisation — {{ model.model_name }} · <code>{{ model.model_version }}</code></h1>

<form method="post" action="{{ url_prefix }}/credentials/{{ model.model_id }}/edit"
      class="fr-mt-2w" style="max-width:40rem">

  <div class="fr-input-group">
    <label class="fr-label" for="base_url">URL de base (optionnel)
      <span class="fr-hint-text">Vide = URL de la config plateforme, puis défaut provider.</span>
    </label>
    <input class="fr-input" id="base_url" name="base_url" type="url"
           value="{{ cred.base_url if cred and cred.base_url else '' }}">
  </div>

  <div class="fr-input-group">
    <label class="fr-label" for="api_key">Clé API (chiffrée à l'écriture)
      <span class="fr-hint-text">
        {% if cred and cred.api_key_encrypted %}Une clé est enregistrée (chiffrée). Laisse vide pour la conserver.
        {% else %}Vide = repli sur la clé plateforme puis les variables d'environnement.{% endif %}
      </span>
    </label>
    <input class="fr-input" id="api_key" name="api_key" type="password" autocomplete="off"
           placeholder="{{ '••••••••' if cred and cred.api_key_encrypted else '' }}">
  </div>

  {% if cred and cred.api_key_encrypted %}
  <div class="fr-checkbox-group fr-mb-2w">
    <input type="checkbox" id="clear_api_key" name="clear_api_key" value="true">
    <label class="fr-label" for="clear_api_key">Effacer la clé enregistrée</label>
  </div>
  {% endif %}

  <div class="fr-input-group">
    <label class="fr-label" for="extra_headers">En-têtes HTTP additionnels (JSON, optionnel)
      <span class="fr-hint-text">Objet JSON, ex. {"X-Api-Version": "2"}. Priment sur la config plateforme.</span>
    </label>
    <textarea class="fr-input" id="extra_headers" name="extra_headers" rows="3">{{ cred.extra_headers | tojson if cred and cred.extra_headers else '' }}</textarea>
  </div>

  <div class="fr-toggle fr-mb-2w">
    <input type="checkbox" class="fr-toggle__input" id="is_active" name="is_active"
           {% if not cred or cred.is_active %}checked{% endif %}>
    <label class="fr-toggle__label" for="is_active">Active (utilisée pour les évaluations de cette organisation)</label>
  </div>

  <button type="submit" class="fr-btn fr-mt-2w">Enregistrer</button>
  <a class="fr-btn fr-btn--secondary fr-mt-2w fr-ml-2w" href="{{ url_prefix }}/models">Annuler</a>
</form>
{% endblock %}
