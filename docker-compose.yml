# Déploiement VibeLab (contrat spawn) : service web sur :3000 derrière Traefik
# + PostgreSQL interne (non exposé). Les clés API sont lues depuis le .env du
# dossier de déploiement (/opt/apps/<nom>/.env sur le VPS), jamais commité.
#
# Pour le dev local (Postgres seul sur localhost:5432) :
#   docker compose -f docker-compose.local.yml up -d

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://geoeval:geoeval@db:5432/geoeval
      # OpenRouter = provider plateforme par défaut (ADR-080)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      USD_EUR_RATE: ${USD_EUR_RATE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Albert : fourni par les secrets partagés de la plateforme (SOPS, ADR-056)
      ALBERT_API_KEY: ${ALBERT_API_KEY:-}
      ALBERT_BASE_URL: ${ALBERT_BASE_URL:-}
      # Auth (ADR-077, PR#12) : en prod, le gate injecte X-Gate-*. En dev
      # local via docker-compose, DEV_FAKE_EMAIL simule un user connu.
      DEV_FAKE_EMAIL: ${DEV_FAKE_EMAIL:-}
      DEV_FAKE_GROUPS: ${DEV_FAKE_GROUPS:-}
      # Fernet BYOK (ADR-078, PR#14) — voir .env.example pour la génération.
      GEOEVAL_KEY_SECRET: ${GEOEVAL_KEY_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks: [proxy, default]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.${APP_NAME}.entrypoints=websecure
      - traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: geoeval
      POSTGRES_PASSWORD: geoeval
      POSTGRES_DB: geoeval
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [default]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoeval -d geoeval"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:

networks:
  proxy:
    external: true
