# Déploiement VibeLab (contrat spawn) : service web sur :3000 derrière Traefik
# + PostgreSQL interne (non exposé). Les clés API sont lues depuis le .env du
# dossier de déploiement (/opt/apps/<nom>/.env sur le VPS), jamais commité.
#
# Pour le dev local (Postgres seul sur localhost:5432) :
#   docker compose -f docker-compose.local.yml up -d

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://geoeval:geoeval@db:5432/geoeval
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks: [proxy, default]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.${APP_NAME}.entrypoints=websecure
      - traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: geoeval
      POSTGRES_PASSWORD: geoeval
      POSTGRES_DB: geoeval
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [default]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoeval -d geoeval"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:

networks:
  proxy:
    external: true
